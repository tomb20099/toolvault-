<!DOCTYPE html>
<html lang="en">
<head>

<title>Internet Speed Test + QR Code Maker - Tool Vault</title>

<style>
:root{--bg:#0b0f19;--card:#121829;--accent:#7c3aed;--text:#e5e7eb}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text);min-height:100vh}
header{padding:20px;text-align:center}
h1{margin:0;font-size:28px;background:linear-gradient(90deg,#a78bfa,#60a5fa);-webkit-background-clip:text;color:transparent}
.card{max-width:500px;margin:20px auto;background:var(--card);border-radius:20px;padding:28px;text-align:center}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:24px 0}
.metric{background:#0b1220;padding:16px;border-radius:12px}
.metric.label{font-size:12px;opacity:.7;text-transform:uppercase}
.metric.value{font-size:28px;font-weight:700;margin-top:4px}
.metric.unit{font-size:12px;opacity:.6}
button{background:var(--accent);color:white;border:0;padding:16px 32px;border-radius:12px;font-size:18px;font-weight:600;cursor:pointer;width:100%;margin-top:10px}
button:disabled{opacity:.5}
#status{margin-top:16px;opacity:.8;min-height:20px}
.progress{height:6px;background:#0b1220;border-radius:3px;overflow:hidden;margin:20px 0}
.progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#7c3aed,#3b82f6);transition:width.2s}
.tools{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:500px;margin:0 auto 40px;padding:0 20px}
.tool{background:var(--card);padding:14px;border-radius:12px;text-align:center;font-size:14px;cursor:pointer}
.tool.active{outline:2px solid var(--accent)}
footer{text-align:center;padding:20px;opacity:.5;font-size:12px}
#toolPanel{max-width:500px;margin:-20px auto 40px;padding:0 20px;display:none}
#toolPanel input,#toolPanel textarea{background:#0b1220;border:1px solid #1f2937;color:var(--text);padding:12px;border-radius:8px;width:100%;margin:8px 0;font-size:16px}
#toolPanel.result{background:#0b1220;padding:12px;border-radius:8px;margin:8px 0;word-break:break-all;font-family:monospace}
#qrCanvas{background:white;padding:16px;border-radius:8px;margin:12px auto;display:block}
</style>
</head>
<body>
<header><h1>Tool Vault</h1><p>Internet Speed Test + Free Tools</p></header>
<div class="card">
<h2>Internet Speed Test</h2>
<div class="metrics">

<div class="metric"><div class="label">Download</div><div class="value" id="down">—</div><div class="unit">Mbps</div></div>

<div class="progress"><div class="progress-bar" id="bar"></div></div>
<button id="start">START TEST</button>
<div id="status">Ready to test</div>
</div>
<div class="tools">
<div class="tool" data-tool="pass">Password Generator</div>
<div class="tool" data-tool="qr">QR Code Maker</div>
<div class="tool" data-tool="word">Word Counter</div>
<div class="tool" data-tool="json">JSON Formatter</div>
</div>
<div id="toolPanel"></div>
<footer>© 2026 Tool Vault</footer>

// SPEED TEST
const $=function(id){return document.getElementById(id)};
const pingEl=$('ping'),downEl=$('down'),upEl=$('up'),statusEl=$('status'),barEl=$('bar'),btn=$('start');

btn.onclick=async function(){
btn.disabled=true;
pingEl.textContent=downEl.textContent=upEl.textContent='—';
barEl.style.width='0%';
try{
statusEl.textContent='Testing ping...';
let times=[];
for(let i=0;i<3;i++){
const t0=performance.now();
await fetch('https://1.1.1.1/cdn-cgi/trace?r='+Math.random(),{cache:'no-store'}).catch(function(){});
times.push(performance.now()-t0);
barEl.style.width=((i+1)/3*30)+'%';
}
pingEl.textContent=Math.round(times.reduce(function(a,b){return a+b})/times.length);

statusEl.textContent='Testing download...';
const t1=performance.now();
await fetch('https://speed.cloudflare.com/__down?bytes=10000000',{cache:'no-store'});
const mbps=((10000000*8)/((performance.now()-t1)/1000)/1000000).toFixed(1);
downEl.textContent=mbps;
barEl.style.width='70%';

statusEl.textContent='Testing upload...';
const data=new Uint8Array(2000000);
const t2=performance.now();
await fetch('https://speed.cloudflare.com/__up',{method:'POST',body:data,cache:'no-store'});
upEl.textContent=((2000000*8)/((performance.now()-t2)/1000)/1000000).toFixed(1);
barEl.style.width='100%';
statusEl.textContent='Test complete!';
btn.textContent='TEST AGAIN';
}catch(e){
statusEl.textContent='Error - try again';
}
btn.disabled=false;
};

}else{
panel.innerHTML='<div class="card" style="margin:0"><h3>Coming Soon</h3><p>This tool is being built.</p></div>';
}
};
});
