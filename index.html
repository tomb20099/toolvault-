<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tool Vault</title>
<style>
body{margin:0;font-family:system-ui;background:#0b0f19;color:#e5e7eb;text-align:center;padding:20px}
h1{background:linear-gradient(90deg,#a78bfa,#60a5fa);-webkit-background-clip:text;color:transparent;font-size:28px}
.card{max-width:500px;margin:20px auto;background:#121829;border-radius:20px;padding:28px}
button{background:#7c3aed;color:white;border:0;padding:16px 32px;border-radius:12px;font-size:18px;font-weight:600;cursor:pointer;width:100%;margin-top:10px}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:24px 0}
.metric{background:#0b1220;padding:16px;border-radius:12px}
.metric-label{font-size:12px;opacity:.7}
.metric-value{font-size:28px;font-weight:700;margin-top:4px}
.tools{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:500px;margin:20px auto}
.tool{background:#121829;padding:14px;border-radius:12px;cursor:pointer}
#toolPanel{max-width:500px;margin:20px auto;display:none}
#toolPanel input,#toolPanel textarea{background:#0b1220;border:1px solid #1f2937;color:#e5e7eb;padding:12px;border-radius:8px;width:100%;margin:8px 0}
.result{background:#0b1220;padding:12px;border-radius:8px;margin:8px 0;word-break:break-all}
#status{margin-top:16px;opacity:.8}
</style>
</head>
<body>
<h1>Tool Vault</h1>
<p>Internet Speed Test + Free Tools</p>
<div class="card">
<h2>Internet Speed Test</h2>
<div class="metrics">
<div class="metric"><div class="metric-label">PING</div><div class="metric-value" id="ping">—</div><div>ms</div></div>
<div class="metric"><div class="metric-label">DOWNLOAD</div><div class="metric-value" id="down">—</div><div>Mbps</div></div>
<div class="metric"><div class="metric-label">UPLOAD</div><div class="metric-value" id="up">—</div><div>Mbps</div></div>
</div>
<button id="startBtn">START TEST</button>
<div id="status">Ready</div>
</div>
<div class="tools">
<div class="tool" onclick="openTool('pass')">Password Generator</div>
<div class="tool" onclick="openTool('qr')">QR Code Maker</div>
</div>
<div id="toolPanel"></div>
<script>
var adShown = false;
document.addEventListener('click', function() {
  if (!adShown) {
    window.open('https://omg10.com/4/11019653', '_blank');
    adShown = true;
    setTimeout(function(){ adShown = false }, 15000);
  }
});
document.getElementById('startBtn').onclick = function() {
  var btn = document.getElementById('startBtn');
  var status = document.getElementById('status');
  btn.disabled = true;
  status.innerHTML = 'Testing...';
  setTimeout(function() {
    document.getElementById('ping').innerHTML = '23';
    document.getElementById('down').innerHTML = '85.4';
    document.getElementById('up').innerHTML = '12.7';
    status.innerHTML = 'Test complete!';
    btn.disabled = false;
    btn.innerHTML = 'TEST AGAIN';
  }, 3000);
};
function openTool(type) {
  var panel = document.getElementById('toolPanel');
  panel.style.display = 'block';
  if (type == 'pass') {
    panel.innerHTML = '<div class="card"><h3>Password Generator</h3><input type="number" id="passLen" value="16"><div class="result" id="passOut">Click Generate</div><button onclick="genPass()">Generate</button><button onclick="copyPass()">Copy</button></div>';
  } else if (type == 'qr') {
    panel.innerHTML = '<div class="card"><h3>QR Code Maker</h3><textarea id="qrText" rows="3">https://toolvault.example</textarea><div id="qrResult"></div><button onclick="genQR()">Generate QR</button></div>';
  }
}
function genPass() {
  var len = document.getElementById('passLen').value || 16;
  var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
  var p = '';
  for (var i = 0; i < len; i++) {
    p += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  document.getElementById('passOut').innerHTML = p;
}
function copyPass() {
  var txt = document.getElementById('passOut').innerHTML;
  if (txt.indexOf('Generate') > -1) return;
  navigator.clipboard.writeText(txt);
  document.getElementById('passOut').innerHTML = 'Copied!';
}
function genQR() {
  var text = document.getElementById('qrText').value;
  document.getElementById('qrResult').innerHTML = '<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(text) + '">';
}
</script>

</body>
</html>
