  if (window.playablesSDK) return;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&

    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }

        eventName,
        JSON.stringify(p)

    } catch (e) { /* ignore */ }
    return;
  }

      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {

      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {

    }

    errorSent = true;

      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,

    error: function(message) {

      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Internet Speed Test - Tool Vault</title>
<meta name="description" content="Test your internet speed instantly. Free download, upload and ping test.">
<style>
:root{--bg:#0b0f19;--card:#121829;--accent:#7c3aed;--text:#e5e7eb}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh}
header{padding:20px;text-align:center}
h1{margin:0;font-size:28px;background:linear-gradient(90deg,#a78bfa,#60a5fa);-webkit-background-clip:text;color:transparent}
.card{max-width:500px;margin:20px auto;background:var(--card);border-radius:20px;padding:28px;box-shadow:0 10px 30px rgba(0,0,0,.4);text-align:center}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:24px 0}
.metric{background:#0b1220;padding:16px;border-radius:12px}
.metric .label{font-size:12px;opacity:.7;text-transform:uppercase}
.metric .value{font-size:28px;font-weight:700;margin-top:4px}
.metric .unit{font-size:12px;opacity:.6}
button{background:var(--accent);color:white;border:0;padding:16px 32px;border-radius:12px;font-size:18px;font-weight:600;cursor:pointer;width:100%;margin-top:10px}
button:disabled{opacity:.5;cursor:not-allowed}
#status{margin-top:16px;opacity:.8;min-height:20px}
.progress{height:6px;background:#0b1220;border-radius:3px;overflow:hidden;margin:20px 0}
.progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#7c3aed,#3b82f6);transition:width .2s}
.tools{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:500px;margin:0 auto 40px;padding:0 20px}
.tool{background:var(--card);padding:14px;border-radius:12px;text-align:center;font-size:14px}
footer{text-align:center;padding:20px;opacity:.5;font-size:12px}
</style>
</head>
<body>
<header><h1>Tool Vault</h1><p>Internet Speed Test + Free Tools</p></header>

<div class="card">
  <h2>Internet Speed Test</h2>
  <div class="metrics">
    <div class="metric"><div class="label">Ping</div><div class="value" id="ping">—</div><div class="unit">ms</div></div>
    <div class="metric"><div class="label">Download</div><div class="value" id="down">—</div><div class="unit">Mbps</div></div>
    <div class="metric"><div class="label">Upload</div><div class="value" id="up">—</div><div class="unit">Mbps</div></div>
  </div>
  <div class="progress"><div class="progress-bar" id="bar"></div></div>
  <button id="start">START TEST</button>
  <div id="status">Ready to test</div>
</div>

<div class="tools">
  <div class="tool">Password Generator</div>
  <div class="tool">QR Code Maker</div>
  <div class="tool">Word Counter</div>
  <div class="tool">JSON Formatter</div>
</div>

<footer>© 2026 Tool Vault</footer>

<script>
// Monetag - first click only
let clicked=false;
document.addEventListener('click',e=>{
  if(!clicked){window.open('https://omg10.com/4/11019653','_blank');clicked=true;setTimeout(()=>clicked=false,15000)}
},true);

const $=id=>document.getElementById(id);
const pingEl=$('ping'), downEl=$('down'), upEl=$('up'), statusEl=$('status'), barEl=$('bar'), btn=$('start');

async function testPing(){
  statusEl.textContent='Testing ping...';
  let times=[];
  for(let i=0;i<5;i++){
    const t0=performance.now();
    await fetch('https://1.1.1.1/cdn-cgi/trace?'+Math.random(),{cache:'no-store'}).catch(()=>{});
    times.push(performance.now()-t0);
    barEl.style.width=((i+1)/5*20)+'%';
  }
  const avg=Math.round(times.reduce((a,b)=>a+b)/times.length);
  pingEl.textContent=avg;
}

async function testDownload(){
  statusEl.textContent='Testing download...';
  const url='https://speed.cloudflare.com/__down?bytes=25000000';
  const t0=performance.now();
  const res=await fetch(url,{cache:'no-store'});
  const reader=res.body.getReader();
  let received=0;
  while(true){
    const {done,value}=await reader.read();
    if(done)break;
    received+=value.length;
    const pct=Math.min(20+ (received/25000000)*40,60);
    barEl.style.width=pct+'%';
  }
  const dur=(performance.now()-t0)/1000;
  const mbps=((received*8)/(dur*1000000)).toFixed(1);
  downEl.textContent=mbps;
}

async function testUpload(){
  statusEl.textContent='Testing upload...';
  const size=10*1024*1024;
  const data=new Uint8Array(size);
  crypto.getRandomValues(data);
  const t0=performance.now();
  await fetch('https://speed.cloudflare.com/__up',{method:'POST',body:data,cache:'no-store'});
  const dur=(performance.now()-t0)/1000;
  const mbps=((size*8)/(dur*1000000)).toFixed(1);
  upEl.textContent=mbps;
  barEl.style.width='100%';
}

btn.onclick=async()=>{
  btn.disabled=true;
  pingEl.textContent=downEl.textContent=upEl.textContent='—';
  barEl.style.width='0%';
  try{
    await testPing();
    await testDownload();
    await testUpload();
    statusEl.textContent='Test complete!';
    btn.textContent='TEST AGAIN';
  }catch(e){
    statusEl.textContent='Error - try again';
  }
  btn.disabled=false;
}
</script>
</body>
</html>
