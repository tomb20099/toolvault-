<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Internet Speed Test + QR Code Maker - Tool Vault</title>
<meta name="description" content="Test your internet speed instantly. Free download, upload and ping test. Plus password generator and QR code maker.">
<style>
:root{--bg:#0b0f19;--card:#121829;--accent:#7c3aed;--text:#e5e7eb}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh}
header{padding:20px;text-align:center}
h1{margin:0;font-size:28px;background:linear-gradient(90deg,#a78bfa,#60a5fa);-webkit-background-clip:text;color:transparent}
.card{max-width:500px;margin:20px auto;background:var(--card);border-radius:20px;padding:28px;box-shadow:0 10px 30px rgba(0,0,0,.4);text-align:center}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:24px 0}
.metric{background:#0b1220;padding:16px;border-radius:12px}
.metric.label{font-size:12px;opacity:.7;text-transform:uppercase}
.metric.value{font-size:28px;font-weight:700;margin-top:4px;word-break:break-all}
.metric.unit{font-size:12px;opacity:.6}
button{background:var(--accent);color:white;border:0;padding:16px 32px;border-radius:12px;font-size:18px;font-weight:600;cursor:pointer;width:100%;margin-top:10px}
button:disabled{opacity:.5;cursor:not-allowed}
button.secondary{background:#1f2937;margin-top:8px}
#status{margin-top:16px;opacity:.8;min-height:20px}
.progress{height:6px;background:#0b1220;border-radius:3px;overflow:hidden;margin:20px 0}
.progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#7c3aed,#3b82f6);transition:width.2s}
.tools{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:500px;margin:0 auto 40px;padding:0 20px}
.tool{background:var(--card);padding:14px;border-radius:12px;text-align:center;font-size:14px;cursor:pointer;transition:transform.1s}
.tool:hover{transform:translateY(-2px)}
.tool.active{outline:2px solid var(--accent)}
footer{text-align:center;padding:20px;opacity:.5;font-size:12px}
#toolPanel{max-width:500px;margin:-20px auto 40px;padding:0 20px;display:none}
#toolPanel input,#toolPanel textarea{background:#0b1220;border:1px solid #1f2937;color:var(--text);padding:12px;border-radius:8px;width:100%;margin:8px 0;font-size:16px;font-family:inherit}
#toolPanel.result{background:#0b1220;padding:12px;border-radius:8px;margin:8px 0;word-break:break-all;font-family:monospace}
#qrCanvas{background:white;padding:16px;border-radius:8px;margin:12px auto;display:block;max-width:100%}
</style>
</head>
<body>
<header><h1>Tool Vault</h1><p>Internet Speed Test + Free Tools</p></header>
<div class="card">
<h2>Internet Speed Test</h2>
<div class="metrics">
<div class="metric"><div class="label">Ping</div><div class="value" id="ping">—</div><div class="unit">ms</div></div>
<div class="metric"><div class="label">Download</div><div class="value" id="down">—</div><div class="unit">Mbps</div></div>
<div class="metric"><div class="label">Upload</div><div class="value" id="up">—</div><div class="unit">Mbps</div></div>
</div>
<div class="progress"><div class="progress-bar" id="bar"></div></div>
<button id="start">START TEST</button>
<div id="status">Ready to test</div>
</div>
<div class="tools">
<div class="tool" data-tool="pass">Password Generator</div>
<div class="tool" data-tool="qr">QR Code Maker</div>
<div class="tool" data-tool="word">Word Counter</div>
<div class="tool" data-tool="json">JSON Formatter</div>
<div id="toolPanel"></div>
<footer>© 2026 Tool Vault</footer>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
let clicked=false;
document.addEventListener('click',e=>{
  if(!clicked){
    window.open('https://omg10.com/4/11019653','_blank');
    clicked=true;
    setTimeout(()=>clicked=false,15000)
  }
},true);

const $=id=>document.getElementById(id);
const pingEl=$('ping'),downEl=$('down'),upEl=$('up'),statusEl=$('status'),barEl=$('bar'),btn=$('start');

async function testPing(){
  statusEl.textContent='Testing ping...';
  let times=[];
  for(let i=0;i<5;i++){
    const t0=performance.now();
    await fetch('https://1.1.1.1/cdn-cgi/trace?'+Math.random(),{cache:'no-store'}).catch(()=>{});
    times.push(performance.now()-t0);
    barEl.style.width=((i+1)/5*20)+'%';
  }
  const avg=Math.round(times.reduce((a,b)=>a+b)/times.length);
  pingEl.textContent=avg;
}

async function testDownload(){
  statusEl.textContent='Testing download...';
  const url='https://speed.cloudflare.com/__down?bytes=25000000';
  const t0=performance.now();
  const res=await fetch(url,{cache:'no-store'});
  const reader=res.body.getReader();
  let received=0;
  while(true){
    const{done,value}=await reader.read();
    if(done)break;
    received+=value.length;
    const pct=Math.min(20+(received/25000000)*40,60);
    barEl.style.width=pct+'%';
  }
  const dur=(performance.now()-t0)/1000;
  const mbps=((received*8)/(dur*1000000)).toFixed(1);
  downEl.textContent=mbps;
}

async function testUpload(){
  statusEl.textContent='Testing upload...';
  const size=10*1024*1024;
  const data=new Uint8Array(size);
  crypto.getRandomValues(data);
  const t0=performance.now();
  await fetch('https://speed.cloudflare.com/__up',{method:'POST',body:data,cache:'no-store'});
  const dur=(performance.now()-t0)/1000;
  const mbps=((size*8)/(dur*1000000)).toFixed(1);
  upEl.textContent=mbps;
  barEl.style.width='100%';
}

btn.onclick=async()=>{
  btn.disabled=true;
  pingEl.textContent=downEl.textContent=upEl.textContent='—';
  barEl.style.width='0%';
  try{
    await testPing();
    await testDownload();
    await testUpload();
    statusEl.textContent='Test complete!';
    btn.textContent='TEST AGAIN';
  }catch(e){
    statusEl.textContent='Error - try again';
  }
  btn.disabled=false;
};

const panel=$('toolPanel');
document.querySelectorAll('.tool').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.tool').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    const tool=t.dataset.tool;
    panel.style.display='block';
    if(tool==='pass'){
      panel.innerHTML=`<div class="card" style="margin:0"><h3>Password Generator</h3><input type="number" id="passLen" value="16" min="8" max="64" placeholder="Length"><div class="result" id="passOut">Click Generate</div><button onclick="genPass()">Generate</button><button class="secondary" onclick="copyPass()">Copy</button></div>`;
    }else if(tool==='qr'){
      panel.innerHTML=`<div class="card" style="margin:0"><h3>QR Code Maker</h3><textarea id="qrText" rows="3" placeholder="Enter URL or text...">https://toolvault.example</textarea><canvas id="qrCanvas"></canvas><button onclick="genQR()">Generate QR Code</button><button class="secondary" onclick="downloadQR()">Download PNG</button></div>`;
      genQR();
    }else{
      panel.innerHTML=`<div class="card" style="margin:0"><h3>Coming Soon</h3><p>This tool is being built. Check back later!</p></div>`;
    }
  }
});

function genPass(){
  const len=parseInt($('passLen').value)||16;
  const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
  let p='';
  const arr=new Uint32Array(len);
  crypto.getRandomValues(arr);
  for(let i=0;i<len;i++)p+=chars[arr[i]%chars.length];
  $('passOut').textContent=p;
}

function copyPass(){
  const txt=$('passOut').textContent;
  if(txt==='Click Generate'||txt==='Copied!')return;
  navigator.clipboard.writeText(txt);
  $('passOut').textContent='Copied!';
  setTimeout(()=>$('passOut').textContent=txt,1000);
}

function genQR(){
  const text=$('qrText').value||'https://toolvault.example';
  const canvas=$('qrCanvas');
  QRCode.toCanvas(canvas,text,{width:256,margin:2,color:{dark:'#000000',light:'#ffffff'}});
}

function downloadQR(){
  const canvas=$('qrCanvas');
  const link=document.createElement('a');
  link.download='qrcode.png';
  link.href=canvas.toDataURL();
  link.click();
}
</script>
</body>
</html>
